<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Search Engine</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <h1>Makeup Search</h1>

  <!-- barra de búsqueda -->
  <div class="search-area">
    <div class="search-wrapper">
        <input type="text" id="query" placeholder="Search something">
        <div id="suggestions"></div>
    </div>
    <button onclick="buscar()">Search</button>
  </div>

  <!-- stats -->
  <div id="stats"></div>

  <!-- resultados -->
  <div id="resultados"></div>

  <script>
    // cargar estadísticas al iniciar
    fetch('/stats')
      .then(r => r.json())
      .then(data => {
        document.getElementById('stats').innerHTML =
          `Documents: ${data.total_documents} | Vocabulary: ${data.vocabulary_size} terms`;
      });

    // buscar al presionar enter
    document.getElementById('query').addEventListener('keydown', e => {
      if (e.key === 'Enter') buscar();
    });

    document.getElementById('query').addEventListener('input', e => {
      const value = e.target.value.trim();
      // se muestran sugerencias solamente si el input es mayor a 2 letras
      if (value.length < 2) {
        hideSuggestions();
        return;
      }

      fetch(`/autocomplete?q=${encodeURIComponent(value)}`)
        .then(r => r.json())
        .then(suggestions => {
          showSuggestions(suggestions);
        });
    });

    function showSuggestions(suggestions) {
      const container = document.getElementById('suggestions');

      if (suggestions.length === 0) {
        hideSuggestions();
        return;
      }

      // un div por cada sugerencia
      container.innerHTML = suggestions.map(term => `
        <div class="suggestion-item" onclick="selectSuggestion('${term}')">
          ${term}
        </div>
      `).join('');
    }

    function selectSuggestion(term) {
      // la sugerencia se muestra en el input y la barra search
      document.getElementById('query').value = term;
      hideSuggestions();
      buscar();
    }
    // función para quitar las sugerencias
    function hideSuggestions() {
      document.getElementById('suggestions').innerHTML = '';
    }

    // se quitan las sugerencias si el usuario hace click fuera
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrapper')) {
        hideSuggestions();
      }
    });

    function buscar() {
      // elimina espacios al inicio o final
      const query = document.getElementById('query').value.trim();
      // debe haber una consulta
      if (!query) return;
      //convertir caracteres especiales de la consulta a formato url seguro (espacios y tildes)
      fetch(`/search?q=${encodeURIComponent(query)}`)
        .then(r => r.json())
        .then(data => {
          // en caso de error como consultas vacías
          if (data.error) {
            document.getElementById('resultados').innerHTML = data.error;
            return;
          }

          let html = `<p>Results: ${data.total_found} | Time: ${data.search_time_ms}ms</p>`;

          data.results.forEach((doc, i) => {
            // construye la posición en ranking, título, score, url, target para pestaña nueva, primeros 200 caracteres de preview
            html += `
              <hr>
              <p><b>#${i+1} — ${doc.title}</b> (Score: ${doc.score})</p>
              <p><a href="${doc.source}" target="_blank">${doc.source}</a></p>
              <p>${doc.text.substring(0, 200)}...</p>
            `;
          });
          // insertar html en div resultados
          document.getElementById('resultados').innerHTML = html;
        });
    }
  </script>

</body>
</html>
